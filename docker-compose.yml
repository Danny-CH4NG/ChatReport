version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: traffic_postgres
    environment:
      POSTGRES_DB: traffic_db
      POSTGRES_USER: traffic_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U traffic_user -d traffic_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  mcp_server:
    build:
      context: ./mcp_server
      dockerfile: Dockerfile
    container_name: traffic_mcp
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: traffic_db
      DB_USER: traffic_user
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      MCP_PORT: 8080
      SCHEMA_CONTEXT_PATH: /app/schema_context.yaml
      AUDIT_LOG_DIR: /app/logs
    volumes:
      - ./app/schema_context.yaml:/app/schema_context.yaml:ro
      - mcp_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    restart: unless-stopped

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: traffic_app
    env_file:
      - .env
    environment:
      MCP_SERVER_URL: http://mcp_server:8080
      CHAINLIT_AUTH_SECRET: ${CHAINLIT_AUTH_SECRET:-dev_secret_change_in_prod}
      CHAINLIT_HOST: 0.0.0.0
      CHAINLIT_PORT: 8000
    volumes:
      - ./outputs:/app/outputs
      - ./app/schema_context.yaml:/app/schema_context.yaml
    ports:
      - "8000:8000"
    depends_on:
      - mcp_server
    restart: unless-stopped

volumes:
  pg_data:
  mcp_logs:
